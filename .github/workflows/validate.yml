name: Validate Homey App

# Validate every PR so problems surface before merge. Every change reaches main
# via a PR, and main itself is validated by publish.yml, so a push trigger here
# would only duplicate the run.
on:
  pull_request:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate at publish level
        uses: athombv/github-action-homey-app-validate@master
        with:
          level: publish
